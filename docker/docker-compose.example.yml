# Example production deployment using prebuilt images.
#
# Snorcal app + Redis + two bambuddy slicer sidecars (OrcaSlicer + BambuStudio).
# Pull slicer images from maziggy's GHCR — see https://github.com/maziggy/bambuddy/blob/main/slicer-api/README.md
#
#   docker compose -f docker/docker-compose.example.yml up -d
#
# Note: slicer sidecars do NOT share a volume with the app. Snorcal uploads the
# 3MF via HTTP and downloads the gcode back over HTTP. Each container has its
# own /data.

services:
  app:
    image: ghcr.io/davidphillips2/snorcal:${SNORCAL_TAG:-latest}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - snorcal-data:/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/data
      - NODE_ENV=production
      - SLICER_URL_ORCASLICER=http://orca-slicer-api:3003
      - SLICER_URL_BAMBUSTUDIO=http://bambu-studio-api:3001
      # - DEBUG_PRINTER=1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  orca-slicer-api:
    image: ghcr.io/maziggy/orca-slicer-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  bambu-studio-api:
    image: ghcr.io/maziggy/bambu-studio-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    volumes:
      - snorcal-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  snorcal-data:
  snorcal-redis:
