# Example production deployment using prebuilt images.
#
# Snorcal app + two bambuddy slicer sidecars (OrcaSlicer + BambuStudio).
# Pull slicer images from maziggy's GHCR — see https://github.com/maziggy/bambuddy/blob/main/slicer-api/README.md
#
#   docker compose -f docker/docker-compose.example.yml up -d
#
# Note: slicer sidecars do NOT share a volume with the app. Snorcal uploads the
# 3MF via HTTP and downloads the gcode back over HTTP. Each container has its
# own /data.
#
# Redis is optional (commented out by default). Without it, slices run
# in-process via the direct path — fine for single-user setups. Uncomment
# the redis service + REDIS_HOST/REDIS_PORT in `app` to re-enable BullMQ.

services:
  app:
    image: ghcr.io/davidphillips2/snorcal:${SNORCAL_TAG:-latest}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - snorcal-data:/data
    environment:
      # Redis is optional — uncomment alongside the `redis` service below
      # to enable BullMQ-backed job queue. Without it, slices run in-process.
      # - REDIS_HOST=redis
      # - REDIS_PORT=6379
      - DATA_DIR=/data
      - NODE_ENV=production
      - SLICER_URL_ORCASLICER=http://orca-slicer-api:3000
      - SLICER_URL_BAMBUSTUDIO=http://bambu-studio-api:3000
      # - DEBUG_PRINTER=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  orca-slicer-api:
    image: ghcr.io/maziggy/orca-slicer-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  bambu-studio-api:
    image: ghcr.io/maziggy/bambu-studio-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Redis (optional — enables BullMQ job queue). Uncomment alongside
  # REDIS_HOST/REDIS_PORT in `app` to re-enable.
  # redis:
  #   image: redis:7-alpine
  #   volumes:
  #     - snorcal-redis:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M

volumes:
  snorcal-data:
  # snorcal-redis:
