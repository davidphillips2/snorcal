services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - snorcal-data:/data
    depends_on:
      redis:
        condition: service_healthy
      slicer:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATA_DIR=/data
      - NODE_ENV=production
      - SLICER_URL=http://slicer:3001
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  slicer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.slicer
    volumes:
      - snorcal-data:/data
    environment:
      - DISPLAY=:99
      - DATA_DIR=/data
      - SLICER_PORT=3001
      - SLICER_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    volumes:
      - snorcal-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  snorcal-data:
  snorcal-redis:
