services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - snorcal-data:/data
    environment:
      # Redis is optional — uncomment to enable BullMQ-backed job queue.
      # Without it, slices run in-process (fine for single-user setups).
      # - REDIS_HOST=redis
      # - REDIS_PORT=6379
      - DATA_DIR=/data
      - NODE_ENV=production
      - SLICER_URL_ORCASLICER=http://orca-slicer-api:3003
      - SLICER_URL_BAMBUSTUDIO=http://bambu-studio-api:3001
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Bambuddy slicer sidecars (optional but recommended for actual slicing).
  # Comment out the one you don't need; remove the corresponding SLICER_URL_*
  # env above if you do.
  orca-slicer-api:
    image: ghcr.io/maziggy/orca-slicer-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  bambu-studio-api:
    image: ghcr.io/maziggy/bambu-studio-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Redis (optional — enables BullMQ job queue). Uncomment alongside
  # REDIS_HOST/REDIS_PORT in `app` to re-enable.
  # redis:
  #   image: redis:7-alpine
  #   volumes:
  #     - snorcal-redis:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M

volumes:
  snorcal-data:
  # snorcal-redis:
