name: Publish Docker images

# Builds and pushes two images to GitHub Container Registry:
#   ghcr.io/<owner>/snorcal         — slim Node app (amd64 + arm64)
#   ghcr.io/<owner>/snorcal-slicer  — Ubuntu + Xvfb + slicer binaries (amd64 only)
#
# Triggers:
#   - git tag v*.*.*   → semver tags (e.g. v1.2.3 → 1.2.3, 1.2, 1, latest)
#   - workflow_dispatch → manual run from the Actions tab
#
# Slicer image is amd64-only because the upstream slicer binaries from
# SimplyPrint/slicer-builds are x86_64 AppImages. Building them on arm64
# under QEMU would fail at runtime (binaries segfault). If you need arm64
# slicer support, build slicers from source separately.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_latest:
        description: 'Also tag this build as :latest'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-app:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/snorcal
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.force_latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.app
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=app-${{ matrix.platform }}

  build-slicer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/snorcal-slicer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.force_latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.slicer
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slicer
          cache-to: type=gha,mode=max,scope=slicer
